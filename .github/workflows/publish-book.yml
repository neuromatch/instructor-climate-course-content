name: publish-book
on:
  workflow_dispatch:
permissions:
  contents: write
  actions: read  # Required for cross-repo action references
defaults:
  run:
    shell: bash -el {0}
env:
  NB_KERNEL: climate
  NMA_REPO: instructor-climate-course-content
  NMA_MAIN_BRANCH: main
  PREREQ_INTRO: ClimateScience
  ORG: neuromatch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-deploy-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout instructor repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Get commit message
        run: echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
      - name: Clone climate-course-content tutorials & projects
        run: |
          BRANCH=$(python -c "import os, re; m = re.search(r'climate-course-content:(\w+)', os.environ['COMMIT_MESSAGE']); print(m.group(1) if m else 'main')")
          wget -q https://github.com/neuromatch/climate-course-content/archive/refs/heads/$BRANCH.tar.gz
          tar -xzf $BRANCH.tar.gz
          mv climate-course-content-$BRANCH/tutorials tutorials/
          mv climate-course-content-$BRANCH/projects projects/
          mv climate-course-content-$BRANCH/environment.yml .
          rm -rf climate-course-content-$BRANCH $BRANCH.tar.gz
      - name: Setup Python environment
        uses: neuromatch/climate-course-content/.github/actions/setup-python-env@main
      - name: Install Jupyter Book
        run: pip install jupyter-book==0.15.1 ghp-import
      - name: Setup CI tools
        uses: neuromatch/climate-course-content/.github/actions/setup-ci-tools@main
        with:
          commit-message: ${{ env.COMMIT_MESSAGE }}
          stub-widgets: 'false'
      - name: Setup rendering dependencies
        if: "!contains(env.COMMIT_MESSAGE, 'skip ci')"
        uses: neuromatch/climate-course-content/.github/actions/setup-rendering-deps@main
      - name: Get date for cache rotation
        id: cache-date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT
      - name: Cache Jupyter execution
        uses: actions/cache@v4
        with:
          path: book/.jupyter-cache
          # 🔑 Instructor-specific prefix prevents cache collision
          key: jupyter-exec-instructor-${{ steps.cache-date.outputs.date }}-${{ hashFiles('tutorials/**/*.ipynb', 'requirements.txt', 'environment.yml') }}
          restore-keys: |
            jupyter-exec-instructor-${{ steps.cache-date.outputs.date }}-
            jupyter-exec-instructor-
      - name: Build instructor book
        run: |
          nmaci generate-book instructor
          jupyter-book toc migrate book/_toc.yml -o book/_toc.yml
          ln -sf ../tutorials book/tutorials
          ln -sf ../projects book/projects
          jupyter-book build book
          nmaci parse-html instructor
      - name: Publish to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          ghp-import -n -p -f -c "instructor.comptools.climatematch.io" -m "Update course book" book/_build/html
